{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Sayfa Bulunamadı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f6f3ee] font-sans min-h-screen flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="text-9xl font-extrabold bg-gradient-to-br from-[#8ea6ff] to-[#d9b57d] bg-clip-text text-transparent select-none mb-6">
            404
        </div>
        <div class="rounded-[32px] border border-[#e8e0d6] bg-[#fcfaf6] p-8 shadow-sm">
            <h1 class="text-xl font-bold text-slate-800 mb-2">Sayfa Bulunamadı</h1>
            <p class="text-slate-500 text-sm mb-6">Aradığınız sayfa mevcut değil, kaldırılmış veya taşınmış olabilir.</p>
            <div class="flex items-center justify-center gap-3">
                <a href="/" class="ws-btn ws-btn-primary">
                    <i class="fa-solid fa-house text-sm"></i> Ana Sayfa
                </a>
                <button onclick="history.back()" class="ws-btn ws-btn-secondary">
                    <i class="fa-solid fa-arrow-left text-sm"></i> Geri Dön
                </button>
            </div>
        </div>
    </div>
</body>
</html>
