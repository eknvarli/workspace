<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Giriş Yap{% endblock %} - Notes Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="bg-gray-950 text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <div
        class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-900/10 rounded-full blur-[120px] pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-blue-900/10 rounded-full blur-[120px] pointer-events-none">
    </div>

    <div class="w-full max-w-md p-8 relative z-10">
        <div class="flex justify-center mb-8">
            <div
                class="w-12 h-12 bg-gray-900 border border-gray-800 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/5">
                <i class="fa-solid fa-book-open text-blue-500 text-2xl"></i>
            </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl shadow-xl shadow-black/50 p-8">
            {% block content %}
            {% endblock %}
        </div>

        <div class="text-center mt-6 text-sm text-gray-600">
            <p>&copy; 2026 Notes Workspace. All rights reserved.</p>
        </div>
    </div>
</body>

</html>
