{% load static %}
<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Giriş Yap{% endblock %} — Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .auth-gradient {
            background: linear-gradient(135deg, #EFF6FF 0%, #F8FAFC 50%, #EEF2FF 100%);
        }
        .auth-blob-1 {
            position: absolute;
            top: -15%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .auth-blob-2 {
            position: absolute;
            bottom: -15%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .auth-card {
            box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(226, 232, 240, 0.8);
        }
    </style>
</head>

<body class="font-sans auth-gradient min-h-screen flex items-center justify-center relative overflow-hidden antialiased">
    <div class="auth-blob-1"></div>
    <div class="auth-blob-2"></div>

    <div class="w-full max-w-md p-4 md:p-8 relative z-10">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-cubes text-white text-2xl"></i>
            </div>
        </div>

        <!-- Auth Card -->
        <div class="auth-card bg-white rounded-2xl p-7 md:p-8">
            {% block content %}
            {% endblock %}
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-xs text-slate-400">
            <p>&copy; 2026 Workspace. Tüm hakları saklıdır.</p>
        </div>
    </div>
</body>
</html>
